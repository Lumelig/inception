mariadb:
  build: ./requirements/mariadb
  env_file: ../.env                  # provides MYSQL_DATABASE, MYSQL_USER
  secrets:
    - db_password                    # mounted at /run/secrets/db_password
    - db_root_password               # mounted at /run/secrets/db_root_password
  volumes:
    - mariadb:/var/lib/mysql         # persistent data
  networks:
    - inception
  restart: unless-stopped

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  
wordpress:
  build: ./requirements/wordpress
  env_file: ../.env                  # DOMAIN_NAME, MYSQL_DATABASE, MYSQL_USER, WP_ADMIN_USER etc.
  secrets:
    - db_password                    # /run/secrets/db_password
    - credentials                    # /run/secrets/credentials (WP admin password)
  volumes:
    - wordpress:/var/www/html        # shared with NGINX
  networks:
    - inception
  depends_on:
    - mariadb                        # start mariadb first
  restart: unless-stopped